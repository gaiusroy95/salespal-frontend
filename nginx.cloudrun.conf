# Cloud Run / SPA: avoid stale app after deploy.
# - Browsers often cache / and index.html; force revalidation for those.
# - Vite emits hashed files under /assets/ — safe to cache long-term.

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite build output — content-hashed names
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Root static files (favicon, etc.) — long cache if present
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|webmanifest|map)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Direct index.html + SPA fallback — always revalidate (fixes "deployed but URL shows old UI")
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
